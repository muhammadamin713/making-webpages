<!doctype html>
<html>
  <head>
    <title>Random Petition</title>
    <link href="style.css" rel="stylesheet"/>
  </head>
  <body>
    <header>
      <h1>Welcome to Random Petition</h1>
      <p>
		In this website, we're doing random petition. You submit your support/not-support using the form.
		However, there's a catch. Your submission will go to a random petition.
	  </p>
    </header>
    <main>
      <form action="">
		<!-- Row 1 -->
		<div>
		  <label for="">Email: </label>
		  <input name="" type="email" value=""/>
		  <label for="">Name: </label>
		  <input name="" type="text" value=""/>
		</div>
		<!-- Row 2 -->
		<div>
          <label for="">Date: </label>
          <input name="" type="date" value=""/>
		</div>
		<!-- Row 3 -->
		<div>
          <label for="">I agree to participate in this petition:</label>
          <div>
			<input name="" type="radio" value=""/>
			<label for="">Yes</label>
			
			<input name="" type="radio" value=""/>		  
			<label for="">No</label>		  
		  </div>
		</div>
		<!-- Row 4 -->
		<div>
          <label for="">I support/not support this petition because</label>
          <div>
			<textarea cols="50" id="" name="" rows="20"></textarea>
		  </div>
		</div>
		<!-- Row 5 -->
		<div>
          <input id="submit-button" name="" type="submit" value="Submit"/>
		</div>
      </form>
	</main>
  </body>
</html>
